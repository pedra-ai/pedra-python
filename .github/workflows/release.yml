name: Release

# Tag a version to build and publish `pedra` to PyPI:
#   bump the version in pyproject.toml + src/pedra/__init__.py, then
#   git tag v0.2.1 && git push origin v0.2.1
#
# Requires one repo secret: PYPI_API_TOKEN (a PyPI API token; its value starts
# with "pypi-"). Create it at https://pypi.org/manage/account/token/ and add it
# under Settings → Secrets and variables → Actions.
#
# Alternative (more secure, no stored token): configure PyPI Trusted Publishing
# for this repo + workflow and replace the publish step with
# pypa/gh-action-pypi-publish using OIDC. Token-based is used here for parity
# with the npm release flow.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Run the test suite before publishing.
      - run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
